<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="URM ENROLL">
  <!-- Navy U: left leg + rounded bottom + top of right leg -->
  <path d="M78 70 V132 A50 50 0 0 0 178 132 V70"
        stroke="#15233F" stroke-width="34" stroke-linecap="round" fill="none"/>
  <!-- Gold figure: lower-right of the U reads as the body sweeping to the base -->
  <path d="M178 116 V132 A50 50 0 0 1 128 182"
        stroke="#F4C21B" stroke-width="34" stroke-linecap="round" fill="none"/>
  <!-- Gold head -->
  <circle cx="170" cy="96" r="20" fill="#F4C21B"/>
  <!-- Gold raised arm -->
  <path d="M158 88 Q138 72 120 80"
        stroke="#F4C21B" stroke-width="16" stroke-linecap="round" fill="none"/>
  <!-- Navy mortarboard cap -->
  <path d="M170 52 L214 70 L170 88 L126 70 Z" fill="#15233F"/>
  <!-- Cap button -->
  <circle cx="170" cy="70" r="5" fill="#F4C21B"/>
  <!-- Tassel -->
  <path d="M210 71 V92" stroke="#15233F" stroke-width="4" stroke-linecap="round" fill="none"/>
  <circle cx="210" cy="96" r="5.5" fill="#F4C21B"/>
</svg>
