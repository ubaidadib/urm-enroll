name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Skip the Puppeteer prerender in CI (no Chrome system libs); the build
      # step below validates the production bundle via `vite build` directly.
      PUPPETEER_SKIP_DOWNLOAD: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match the Vercel build runtime (engines.node "24.x").
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Translation parity
        run: npm run check:translations

      - name: Production build (bundle only)
        run: npx vite build

      - name: Security audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high
